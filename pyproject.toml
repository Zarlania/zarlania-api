[tool.pytest.ini_options]
pythonpath = ["scripts/adr_tool"]
testpaths = ["scripts/adr_tool/tests"]
addopts = "--cov=lib --cov=cli --cov-branch --cov-report=term-missing --cov-fail-under=80"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
