name: CI

on:
  pull_request:
    # No labeled/unlabeled here: the required checks below must not run (and skip) on label
    # events. A skipped required check is treated as passing, so re-running on a label change
    # would let a label launder a failing check into a mergeable state. Label-driven
    # re-validation lives in release-check.yml, whose job never skips.
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

# Least privilege by default; only the build job that posts the coverage comment
# is granted pull-requests: write (set at job level below).
permissions:
  contents: read

jobs:
  build:
    name: Build & quality gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # for the JaCoCo coverage PR comment
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Maven verify (Spotless, Checkstyle, SpotBugs+FindSecBugs, parallel tests, JaCoCo)
        # The default suite runs in parallel (one fork per core, each with its own H2). The serial
        # *TransactionalTest suite runs in the separate transactional-tests job below.
        run: ./mvnw -B clean verify
      - name: JaCoCo coverage report comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: JaCoCo Coverage

  transactional-tests:
    name: Transactional tests (serial)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Run the serial *TransactionalTest suite
        # Tests that must commit/roll back for real, so they can't be parallelised or rolled back.
        # Small and scenario-specific; coverage is gated by the main build job, not here.
        run: ./mvnw -B clean test -Ptransactional-tests

  checks:
    name: Lint & ADR tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Cache pre-commit environments
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run lint hooks (Java gates run in the build job)
        run: SKIP=java-quality pre-commit run --all-files --show-diff-on-failure
      - name: ADR tooling tests
        run: pytest --cov-fail-under=80

  secrets:
    name: Secret scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        run: |
          version=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Scan PR commits for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gitleaks git . --redact --no-banner --log-opts="${BASE_SHA}..${HEAD_SHA}"

  governance:
    name: PR references an issue
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify issue reference in PR title or branch
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
          PR_USER: ${{ github.event.pull_request.user.login }}
        run: |
          if [ "$PR_USER" = "dependabot[bot]" ]; then
            echo "OK: Dependabot PR is exempt from the issue-reference requirement."
            exit 0
          fi
          if printf '%s' "$PR_TITLE" | grep -qE '#[0-9]+'; then
            echo "OK: PR title references an issue."
          elif printf '%s' "$HEAD_REF" | grep -qE '^[a-z]+/[0-9]+-'; then
            echo "OK: branch name references an issue."
          else
            echo "::error::PR must reference a GitHub issue — put #<issue> in the title or name the branch type/<issue#>-slug." >&2
            exit 1
          fi
