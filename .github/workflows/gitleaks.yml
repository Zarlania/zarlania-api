name: Gitleaks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # No recurring sweep: this workflow has existed since the repository's second
  # commit, so no secret predates it, and the scan below covers full history on
  # every push anyway. Run it manually if a new gitleaks release adds detection
  # rules worth replaying over old commits.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to publish the SARIF report to the Security tab.
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so the scan sees every commit, not just the tip.
          fetch-depth: 0

      # The official gitleaks-action requires a paid licence key for
      # organisation-owned repositories. Running the CLI image directly is
      # functionally identical and free.
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --report-format=sarif \
              --report-path=/repo/gitleaks-report.sarif \
              --redact \
              --verbose

      - name: Upload SARIF report
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks
