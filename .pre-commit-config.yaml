# Fast pre-commit checks. Heavy analysis (SpotBugs/JaCoCo/tests) runs in CI via ./mvnw verify.
minimum_pre_commit_version: "3.5.0"

# docs/superpowers/* are Claude's implementation/planning artifacts (specs & plans).
# They are not source code and are exempt from ALL hooks — no linting, no auto-fixing.
exclude: '^docs/superpowers/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.yaml"]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-d"]
        exclude: ^mvnw$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]

  - repo: local
    hooks:
      - id: java-quality
        name: Spotless + Checkstyle (Java, via mvnw)
        entry: ./mvnw -q spotless:check checkstyle:check
        language: system
        types: [java]
        pass_filenames: false
      - id: adr-check
        name: ADR validation (./scripts/adr check)
        entry: ./scripts/adr check
        language: system
        files: ^docs/adrs/
        pass_filenames: false
