spring.application.name=zarlania-api
server.port=${PORT:8080}

# Actuator: expose only health and info over HTTP; never leak health details publicly.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
# Liveness/readiness probe groups: explicitly enabled because they are not auto-enabled
# outside Kubernetes. Render's health check targets /actuator/health (the aggregate).
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState
management.info.build.enabled=true
management.info.java.enabled=true

# OpenAPI / Swagger UI (public).
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Render framework error responses as RFC 7807 application/problem+json.
spring.mvc.problemdetails.enabled=true

# CORS allowlist (override per environment, e.g. ZARLANIA_CORS_ALLOWED_ORIGINS in Render/compose).
zarlania.cors.allowed-origins=https://zarlania.com,https://www.zarlania.com

# Datasource: H2 in-memory by default; set SPRING_DATASOURCE_URL (plus username/password) to swap
# in Postgres later. PostgreSQL compatibility mode keeps SQL/behaviour close to the eventual target.
# The JDBC driver is intentionally not pinned: Spring Boot infers it from the URL. Note that moving
# to Postgres also requires adding the PostgreSQL JDBC driver (and Flyway's PostgreSQL module) to the
# build — only H2 is on the classpath today, so the driver swap is config + dependency, not config
# alone.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:zarlania;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema; Hibernate only validates the mapped entities against it.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
